name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  main:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Docs"
            python: "3.14"
            tox: docs
          - name: "pytest (3.13)"
            python: "3.13"
            tox: "3.13"
          - name: "pytest (3.14)"
            python: "3.14"
            tox: "3.14"
            coverage: true
          - name: "mypy"
            python: "3.14"
            tox: mypy
          - name: "ruff-format"
            python: "3.14"
            tox: ruff-format
          - name: "ruff-lint"
            python: "3.14"
            tox: ruff-lint
          - name: "zizmor"
            python: "3.14"
            tox: zizmor
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python }}
          activate-environment: true
      - run: uv pip install tox tox-uv
      - run: tox -e ${{ matrix.tox }}
        if: ${{ ! matrix.coverage }}
      - run: tox -e ${{ matrix.tox }} -- --cov-report=xml
        if: ${{ matrix.coverage }}
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: ${{ matrix.coverage }}
        with:
          use_oidc: true

  publish:
    name: "Publish image"
    needs: main
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Fetch full history and tags so the version can be derived
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          # Avoid cache poisoning in the job that publishes the image
          enable-cache: false
      - name: Derive version from git tags
        id: version
        run: |
          uv venv
          uv pip install --no-deps .
          echo "version=$(uv pip show comics | sed -n 's/^Version: //p')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # The secrets context is not available in `if` conditions, so probe for
      # the Sentry secrets in a step of its own.
      - name: Check for Sentry secrets
        id: sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Register release in Sentry
        # Only runs where the Sentry secrets are configured, e.g. not in forks
        if: ${{ steps.sentry.outputs.enabled == 'true' }}
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          release: ${{ steps.version.outputs.version }}
