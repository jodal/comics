[project]
site_name = "Comics"
site_description = "Comics is a webcomics aggregator."
site_author = "Stein Magnus Jodal and contributors"
site_url = "https://comics.readthedocs.io/"
copyright = """
Copyright &copy; 2009-2026 Stein Magnus Jodal and contributors
"""
edit_uri = "edit/main/docs/"
repo_url = "https://github.com/jodal/comics"
use_directory_urls = true
nav = [
    {"Introduction" = [
        "index.md",
    ]},
    {"Setup" = [
        "installation.md",
        "bootstrapping.md",
        "deployment.md",
    ]},
    {"Reference" = [
        "crawlers.md",
        "web-api.md",
        "data-model.md",
        "devenv.md",
    ]},
]

[project.theme]
language = "en"
features = [
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.theme.icon]
logo = "lucide/images"
repo = "fontawesome/brands/github"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/jodal/comics"

[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
show_source = false

# Docstrings
docstring_options.ignore_init_summary = true
docstring_section_style = "list"
docstring_style = "google"

# Cross-references
#
# Note: relative_crossrefs and scoped_crossrefs must stay off in this project:
# the comics.comics subpackage shadows the comics package in scoped
# resolution, breaking absolute crossref paths in docstrings.
signature_crossrefs = true
unwrap_annotated = true

# Members
filters = "public"
inherited_members = true
summary = true

# Headings
heading_level = 1
parameter_headings = true
type_parameter_headings = true
show_root_heading = true
show_root_full_path = true
show_symbol_type_heading = true
show_symbol_type_toc = true

# Signatures
line_length = 80
merge_init_into_class = true
separate_signature = true
show_signature_annotations = true
show_signature_type_parameters = true

[project.markdown_extensions.pymdownx.blocks.admonition]

[project.markdown_extensions.pymdownx.details]
# Better admonition support

[project.markdown_extensions.pymdownx.highlight]

[project.markdown_extensions.pymdownx.inlinehilite]
# Inline highlight of code snippets ala `#!python range(10)`

[project.markdown_extensions.smarty]
# Convert e.g. "--" to en dash in prose, like Sphinx smartquotes did

[project.markdown_extensions.pymdownx.magiclink]
repo_url_shorthand = true
provider = "github"
user = "jodal"
repo = "comics"
# With this, #123 links to issues and !123 links to PRs.

[project.markdown_extensions.pymdownx.superfences]
# Better code block support

[project.markdown_extensions.tables]
# Nice data tables
